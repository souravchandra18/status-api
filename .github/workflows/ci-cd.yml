name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── No hardcoded GCP credentials — Workload Identity Federation only ────────
permissions:
  id-token: write   # Required for WIF
  contents: read
  pull-requests: write

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: ${{ secrets.AR_REPO }}         # e.g. status-api
  TF_VERSION: "1.8.0"
  PYTHON_VERSION: "3.11"

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # Stage 1 — Lint & Unit Tests
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: "1 · Lint & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install -r app/requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest app/test_main.py -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing
        env:
          APP_ENV: test
          BUILD_SHA: ${{ github.sha }}
          GCP_PROJECT_ID: test-project

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ══════════════════════════════════════════════════════════════════════════
  # Stage 2 — Security Scan (SAST + Secrets + IaC)
  # ══════════════════════════════════════════════════════════════════════════
  security-scan:
    name: "2 · Security Scan"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full git history for TruffleHog

      - name: Run composite security scan (SAST + secrets)
        uses: ./.github/actions/security-scan
        with:
          artifact-suffix: sast
        # No image-tag here — container scan runs after build in stage 4

      - name: Run tfsec (Terraform IaC security scan)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

  # ══════════════════════════════════════════════════════════════════════════
  # Stage 3 — Terraform Plan
  # ══════════════════════════════════════════════════════════════════════════
  terraform-plan:
    name: "3 · Terraform Plan"
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation — no service account keys
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_allowed_ssh_ip: ${{ secrets.ALLOWED_SSH_IP }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_github_repository: ${{ github.repository }}

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -no-color \
            -out=tfplan.binary 2>&1 | tee tfplan.txt
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_allowed_ssh_ip: ${{ secrets.ALLOWED_SSH_IP }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_github_repository: ${{ github.repository }}

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform/tfplan.binary
            terraform/tfplan.txt
          retention-days: 30

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/tfplan.txt', 'utf8');
            const maxLen = 65000;
            const body = plan.length > maxLen ? plan.substring(0, maxLen) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${body}\n\`\`\``
            });

  # ══════════════════════════════════════════════════════════════════════════
  # Stage 4 — Build, Container Scan & Push to Artifact Registry
  # ══════════════════════════════════════════════════════════════════════════
  build-and-scan:
    name: "4 · Build, Container Scan & Push"
    runs-on: ubuntu-latest
    needs: terraform-plan
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      short-sha: ${{ steps.meta.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}"
          IMAGE_TAG="$REGISTRY/status-api:sha-$SHORT_SHA"
          LATEST_TAG="$REGISTRY/status-api:latest"
          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "latest-tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (multi-stage)
        run: |
          docker build app/ \
            --build-arg BUILD_SHA=${{ steps.meta.outputs.short-sha }} \
            --build-arg APP_VERSION=${{ github.ref_name }} \
            -t ${{ steps.meta.outputs.image-tag }} \
            -t ${{ steps.meta.outputs.latest-tag }}

      # ── D3: Trivy container scan — BLOCKS push if CRITICAL/HIGH found ─────
      - name: Run composite security scan (container)
        uses: ./.github/actions/security-scan
        with:
          artifact-suffix: container
          image-tag: ${{ steps.meta.outputs.image-tag }}

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ steps.meta.outputs.image-tag }}
          docker push ${{ steps.meta.outputs.latest-tag }}

  # ══════════════════════════════════════════════════════════════════════════
  # Stage 5 — Deploy (main branch only — PRs stop at stage 4)
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "5 · Deploy"
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_allowed_ssh_ip: ${{ secrets.ALLOWED_SSH_IP }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_github_repository: ${{ github.repository }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var-file=terraform.tfvars
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_allowed_ssh_ip: ${{ secrets.ALLOWED_SSH_IP }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_github_repository: ${{ github.repository }}

      - name: Get instance IP
        id: get-ip
        working-directory: terraform
        run: echo "ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Rolling restart — pull new image on VM
        run: |
          INSTANCE=$(gcloud compute instances list \
            --filter="name=status-api-instance" \
            --format="value(name)" \
            --project=${{ secrets.GCP_PROJECT_ID }} | head -1)
          ZONE=$(gcloud compute instances list \
            --filter="name=status-api-instance" \
            --format="value(zone)" \
            --project=${{ secrets.GCP_PROJECT_ID }} | head -1)
          echo "Instance: $INSTANCE  Zone: $ZONE"
          if [ -z "$INSTANCE" ]; then
            echo "::error::Could not find status-api instance"
            exit 1
          fi
          gcloud compute ssh "$INSTANCE" \
            --zone="$ZONE" \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --ssh-key-expire-after=10m \
            --tunnel-through-iap \
            --quiet \
            --command="set -e
              REGISTRY=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}
              IMAGE=\$REGISTRY/status-api:sha-${{ needs.build-and-scan.outputs.short-sha }}
              gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
              sudo docker pull \$IMAGE
              sudo docker stop status-api 2>/dev/null || true
              sudo docker rm status-api 2>/dev/null || true
              sudo docker run -d --name status-api --restart unless-stopped -p 8080:8080 -e GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} -e SECRET_NAME=status-api-app-env \$IMAGE
              echo Deploy complete"

      - name: Health check — wait for service
        run: |
          IP="${{ steps.get-ip.outputs.ip }}"
          echo "Waiting for http://$IP:8080/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$IP:8080/health" || echo "000")
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && echo "Health check passed!" && exit 0
            sleep 15
          done
          echo "::error::Health check failed after 12 attempts"
          exit 1

      # ── Slack notification ────────────────────────────────────────────────
      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *status-api deployed to GCP*\nSHA: `${{ needs.build-and-scan.outputs.short-sha }}`\nURL: http://${{ steps.get-ip.outputs.ip }}:8080/health\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *status-api GCP deploy FAILED*\nSHA: `${{ github.sha }}`\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
