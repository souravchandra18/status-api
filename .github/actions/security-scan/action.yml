name: "Security Scan"
description: "Composite action — Bandit SAST, Semgrep, TruffleHog secrets scan, Trivy container scan"

inputs:
  artifact-suffix:
    description: "Suffix to make artifact names unique per call"
    required: false
    default: ""
  image-tag:
    description: "Full Docker image tag to scan"
    required: false
    default: ""

outputs:
  bandit-exit-code:
    description: "Bandit exit code (0 = no HIGH findings)"
    value: ${{ steps.bandit.outputs.exit_code }}
  trivy-exit-code:
    description: "Trivy exit code (0 = no CRITICAL/HIGH CVEs)"
    value: ${{ steps.trivy.outputs.exit_code }}

runs:
  using: "composite"
  steps:

    - name: Install Bandit & Semgrep
      shell: bash
      run: pip install bandit semgrep --quiet

    - name: Run Bandit
      id: bandit
      shell: bash
      run: |
        set +e
        bandit -r app/ -ll -f json -o bandit-report.json 2>/dev/null || true
        python3 << 'PYEOF'
        import json, sys, os
        try:
            d = json.load(open('bandit-report.json'))
            issues = d.get('results', [])
        except Exception:
            issues = []
        high = [i for i in issues if i.get('issue_severity','').upper() == 'HIGH']
        med  = [i for i in issues if i.get('issue_severity','').upper() == 'MEDIUM']
        summary = f"### Bandit SAST Results\nHIGH: **{len(high)}** | MEDIUM: **{len(med)}**\n"
        for i in high[:5]:
            summary += f"- HIGH: {i['issue_text']} [{i['filename']}:{i['line_number']}]\n"
        for i in med[:3]:
            summary += f"- MEDIUM: {i['issue_text']} [{i['filename']}:{i['line_number']}]\n"
        with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
            f.write(summary)
        with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
            f.write(f"exit_code={len(high)}\n")
        if len(high) > 0:
            print(f"::error::Bandit found {len(high)} HIGH severity issue(s) — pipeline blocked")
            sys.exit(1)
        else:
            print(f"Bandit: 0 HIGH findings ({len(med)} MEDIUM — informational only)")
        PYEOF

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report${{ inputs.artifact-suffix && format('-{0}', inputs.artifact-suffix) || '' }}
        path: bandit-report.json
        retention-days: 30

    - name: Run Semgrep
      shell: bash
      run: |
        semgrep --config "p/python" --config "p/flask" app/ \
          --json --output semgrep-report.json || true

    - name: Upload Semgrep report
      uses: actions/upload-artifact@v4
      with:
        name: semgrep-report${{ inputs.artifact-suffix && format('-{0}', inputs.artifact-suffix) || '' }}
        path: semgrep-report.json
        retention-days: 30

    - name: Install TruffleHog
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
          | sh -s -- -b /usr/local/bin

    - name: Run TruffleHog
      shell: bash
      run: |
        trufflehog git file://. --only-verified --json > trufflehog-report.json 2>&1 || true
        COUNT=$(grep -c '"SourceMetadata"' trufflehog-report.json 2>/dev/null || echo 0)
        echo "### TruffleHog Secrets Scan" >> "$GITHUB_STEP_SUMMARY"
        echo "Verified secrets found: **$COUNT**" >> "$GITHUB_STEP_SUMMARY"
        if [ "$COUNT" -gt "0" ]; then
          echo "::error::TruffleHog found $COUNT verified secret(s) — pipeline blocked"
          exit 1
        fi

    - name: Upload TruffleHog report
      uses: actions/upload-artifact@v4
      with:
        name: trufflehog-report${{ inputs.artifact-suffix && format('-{0}', inputs.artifact-suffix) || '' }}
        path: trufflehog-report.json
        retention-days: 30

    - name: Run Trivy image scan
      id: trivy
      if: inputs.image-tag != ''
      shell: bash
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin
        set +e
        trivy image --severity CRITICAL,HIGH --format json --output trivy-report.json "${{ inputs.image-tag }}"
        EXIT=$?
        echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
        exit $EXIT

    - name: Upload Trivy report
      if: inputs.image-tag != ''
      uses: actions/upload-artifact@v4
      with:
        name: trivy-container-report
        path: trivy-report.json
        retention-days: 30
